services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      WEB_ORIGIN: http://localhost:5173
      ADMIN_TOKEN: myfond-admin-token
      CONTENT_FILE_PATH: /app/data/site-content.json
    volumes:
      - myfond_content:/app/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  myfond_content:
